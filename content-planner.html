<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F6F4F0;--surface:#FFF;--surface-alt:#EDEBE7;--border:#D8D4CC;--border-light:#E8E5DF;
--text:#1A1816;--text-secondary:#6B6560;--text-tertiary:#9B9590;
--accent:#C8553D;--accent-light:#F9EEEC;--accent-hover:#B04A34;
--filled:#2C7A50;--filled-bg:#E8F5ED;
--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 12px 40px rgba(0,0,0,.12);
--radius-lg:14px
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:'Lora',serif}

/* Loading & Toast */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
.loading-screen.fade-out{opacity:0;pointer-events:none}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:14px;color:var(--text-secondary)}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:8px;opacity:0;transform:translateY(8px);transition:all .3s;z-index:200;pointer-events:none}
.save-toast.visible{opacity:1;transform:translateY(0)}

/* Header */
.header{padding:40px 48px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:20px}
.header-left h1{font-size:32px;font-weight:700;letter-spacing:-.5px}
.header-left p{color:var(--text-secondary);font-size:14px;margin-top:4px}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btn svg{width:15px;height:15px}
.btn-outline{background:var(--surface);border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--text-secondary);background:var(--surface-alt)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-danger-outline{background:var(--surface);border:1.5px solid var(--border);color:var(--accent)}
.btn-danger-outline:hover{border-color:var(--accent);background:var(--accent-light)}
.stat-pill{font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;background:var(--surface);border:1px solid var(--border-light);color:var(--text-secondary)}
.stat-pill strong{color:var(--text)}

/* Matrix */
.matrix-section{padding:32px 48px}
.section-title{font-size:20px;font-weight:600;margin-bottom:6px}
.section-subtitle{font-size:13px;color:var(--text-secondary);margin-bottom:20px}
.matrix-wrapper{overflow-x:auto;border:1.5px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);box-shadow:var(--shadow-sm)}
.matrix-table{width:100%;border-collapse:collapse;table-layout:fixed}
.matrix-table th,.matrix-table td{border:1px solid var(--border-light);text-align:center;vertical-align:middle;padding:0}
.matrix-table th{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);background:var(--surface-alt);height:48px}
.matrix-table th:first-child{width:148px;min-width:148px;text-align:right;padding-right:16px}
.matrix-table td:first-child{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);text-align:right;background:var(--surface-alt);width:148px;min-width:148px}

/* Cells */
.matrix-cell{width:100%;height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;position:relative;padding:10px 8px;gap:5px;overflow:hidden}
.matrix-cell:hover{background:var(--accent-light)}
.matrix-cell .cell-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.matrix-cell.empty .cell-dot{border:2px dashed var(--border);color:var(--text-tertiary);font-size:13px}
.matrix-cell.empty:hover .cell-dot{border-color:var(--accent);color:var(--accent)}
.matrix-cell.filled .cell-dot{background:var(--filled-bg);color:var(--filled);border:2px solid var(--filled)}
.matrix-cell.partial .cell-dot{background:#FFF8E1;color:#E6A700;border:2px solid #E6A700}
.cell-preview{font-size:10px;line-height:1.3;color:var(--text-tertiary);text-align:center;max-height:52px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-word;padding:0 2px}
.matrix-cell.filled .cell-preview,.matrix-cell.partial .cell-preview{color:var(--text-secondary)}

/* Axis headers */
.axis-col-header{display:flex;align-items:center;justify-content:center;gap:3px;padding:6px 8px;width:100%}
.axis-row-header{display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:10px 12px;width:100%}
.axis-label{cursor:pointer;padding:1px 2px;border-radius:3px;transition:background .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.axis-label:hover{background:rgba(0,0,0,.04)}
.del-btn{width:16px;height:16px;border-radius:50%;border:none;background:transparent;color:var(--text-tertiary);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;transition:opacity .15s}
th:hover .del-btn,td:hover .del-btn{opacity:.8}
.del-btn:hover{background:var(--accent-light);color:var(--accent)}
.axis-input{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);border:1.5px solid var(--accent);border-radius:4px;padding:4px 6px;background:var(--surface);outline:none;width:110px;text-align:center}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:24px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .25s ease-out}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:28px 32px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-header h2{font-size:22px;font-weight:700}
.modal-header .modal-tags{display:flex;gap:8px;margin-top:6px}
.tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px}
.modal-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface-alt);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .2s;flex-shrink:0}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:24px 32px 32px}
.field-group{margin-bottom:20px}
.field-group label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);margin-bottom:8px}
.field-group input,.field-group textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;resize:vertical}
.field-group input:focus,.field-group textarea:focus{border-color:var(--accent);background:var(--surface)}
.field-group textarea{min-height:120px;line-height:1.7}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding-top:8px;border-top:1px solid var(--border-light);margin-top:8px}
.btn-delete{background:none;border:none;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-right:auto;padding:8px 4px}
.btn-delete:hover{text-decoration:underline}

/* Cards */
.cards-section{padding:16px 48px 60px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px}
.content-card{background:var(--surface);border:1.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .25s,transform .25s}
.content-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card-top{padding:20px 24px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.card-top h3{font-size:18px;font-weight:600;line-height:1.3}
.card-top .tag{flex-shrink:0;margin-left:12px}
.card-meta{padding:0 24px;display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.card-meta-item{font-size:11px;font-weight:600;padding:3px 10px;border-radius:5px;background:var(--surface-alt);color:var(--text-secondary)}
.card-meta-item.has{background:var(--filled-bg);color:var(--filled)}
.card-divider{height:1px;background:var(--border-light);margin:0 24px 16px}
.card-body{padding:0 24px 20px}
.card-field{margin-bottom:14px}.card-field:last-child{margin-bottom:0}
.card-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-tertiary);margin-bottom:3px}
.card-field-value{font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap}
.card-edit{display:flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:8px 24px 20px}
.card-edit:hover{opacity:.7}
.card-edit svg{width:13px;height:13px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-tertiary);grid-column:1/-1}
.empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.4}
.empty-state p{font-size:14px}

#pdf-capture{background:var(--bg)}
@media(max-width:768px){.header,.matrix-section,.cards-section{padding-left:20px;padding-right:20px}.cards-grid{grid-template-columns:1fr}.header{flex-direction:column}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen"><div class="loading-spinner"></div><p>Loading your planner…</p></div>
<div class="save-toast" id="saveToast">✓ Saved</div>

<div id="pdf-capture">
<div class="header">
<div class="header-left"><h1>Content Planner</h1><p>Map subjects to formats. Click a cell to plan your content.</p></div>
<div class="header-actions">
<span class="stat-pill"><strong id="filledCount">0</strong> / <span id="totalCount">0</span> planned</span>
<button class="btn btn-outline" onclick="addSubject()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Subject</button>
<button class="btn btn-outline" onclick="addFormat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Format</button>
<button class="btn btn-danger-outline" onclick="resetAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>Reset</button>
<button class="btn btn-primary" id="pdfBtn" onclick="downloadPDF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export PDF</button>
</div>
</div>
<div class="matrix-section"><div class="matrix-wrapper"><table class="matrix-table"><thead id="matrixHead"></thead><tbody id="matrixBody"></tbody></table></div></div>
<div class="cards-section"><h2 class="section-title">Planned Content</h2><p class="section-subtitle">Completed entries appear here as full content cards.</p><div class="cards-grid" id="cardsGrid"></div></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
<div class="modal-header"><div><h2 id="modalTitle"></h2><div class="modal-tags" id="modalTags"></div></div><button class="modal-close" onclick="closeModal()">&times;</button></div>
<div class="modal-body">
<div class="field-group"><label>Text Hook</label><input type="text" id="fTH" placeholder="The text overlay that grabs attention…"></div>
<div class="field-group"><label>Visual Hook</label><input type="text" id="fVH" placeholder="What they see — gesture, expression, framing…"></div>
<div class="field-group"><label>Spoken Hook</label><input type="text" id="fSH" placeholder="The first words out of your mouth…"></div>
<div class="field-group"><label>Script</label><textarea id="fSC" placeholder="Full talking-head script…"></textarea></div>
<div class="modal-footer"><button class="btn-delete" onclick="clearEntry()">Clear entry</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEntry()">Save</button></div>
</div>
</div>
</div>

<script>
const DS=['Housing Affordability','Transit','Climate Crisis','Attack Trump','Infrastructure Investment','Energy Affordability'];
const DF=['List & Rankings','Myth-Busting','Comparison','Personal Story','Engagement Farming'];
const FC={'List & Rankings':'#3D7AC8','Myth-Busting':'#C8553D','Comparison':'#9B6DC8','Personal Story':'#4A9D6E','Engagement Farming':'#C89B3D'};

function seedEntries(){
const e={};
function a(s,f,t,v,sp){e[s+'|||'+f]={textHook:t,visualHook:v,spokenHook:sp,script:''};}

a('Housing Affordability','List & Rankings',
'5 PLACES THAT FIXED RENT',
'Pulling blocks from a Jenga tower. It wobbles but hasn\'t fallen yet. Cut before it does.',
'Five cities cracked the housing code. Number one might surprise you.');
a('Housing Affordability','Myth-Busting',
'MORE HOMES = LOWER RENT',
'Pouring water into a glass that\'s already full. It overflows onto the table. Just keep pouring.',
"Everyone says new housing ruins neighborhoods. That's backwards. Here's the data.");
a('Housing Affordability','Comparison',
'TOKYO RENT VS YOUR RENT',
'Two identical piggy banks on a table. Smash one with a hammer. Coins explode. The other sits untouched.',
"Tokyo built enough housing for everyone. We didn't. Look at the difference.");
a('Housing Affordability','Personal Story',
'MY BLOCK PRICED EVERYONE OUT',
'A house key on a table. Hand reaches for it. Another hand pulls it just out of reach.',
"The block I grew up on? Nobody I knew can afford to live there anymore.");
a('Housing Affordability','Engagement Farming',
'WHAT DO YOU PAY IN RENT?',
'Stuffing cash into a glass jar labeled RENT. The jar cracks. Money still going in.',
"I want to try something. Drop your monthly rent and your city. Let's see how bad it really is.");

a('Transit','List & Rankings',
'3 COUNTRIES WITH GOOD TRAINS',
'Toy car rolls off the edge of a table. Falls. Toy train on the other side keeps going.',
"Three countries figured out transit. We're not even close. Here's why.");
a('Transit','Myth-Busting',
'NOBODY WANTS YOUR CAR',
'Dangling car keys over a trash can. Pause. Fake the drop. Calmly pocket them.',
"Every time someone proposes better transit, people say they're coming for your car. That has never been the plan.");
a('Transit','Comparison',
'YOUR COMMUTE VS PARIS',
'Two egg timers flipped at the same time. One runs out instantly. The other barely started.',
'The average American commutes 55 minutes. In Paris? 35. Same distance. Better system.');
a('Transit','Personal Story',
'2 HOUR BUS. 30 MIN INTERVIEW.',
'Close-up: tying shoes, grabbing a bag, checking a watch, sighing. The ritual of a long trip ahead.',
'When I was 22, I had a job interview 12 miles away. It took me two hours by bus. One way.');
a('Transit','Engagement Farming',
'HOW LONG IS YOUR COMMUTE?',
'Starting a stopwatch. Hold it to camera. Let it run in silence. Just ticking.',
"Real talk — how long does it take you to get to work? Drop it below. I want to see the numbers.");

a('Climate Crisis','List & Rankings',
'5 COMPANIES KILLING THE PLANET',
'Five lit candles on a table. Blowing them out one by one. Smoke rising after each.',
'Five companies are responsible for more emissions than entire countries. Let me name them.');
a('Climate Crisis','Myth-Busting',
'CLIMATE CHANGE IS YOUR GROCERY BILL',
'Unrolling a grocery receipt. It keeps going. Off the table. Hits the floor. Still going.',
"People act like climate change is something that happens later. It's happening to your wallet right now.");
a('Climate Crisis','Comparison',
'OIL MONEY VS CLEAN ENERGY MONEY',
'Two glasses. Pour a massive jug of water into one (overflows). One tiny drop into the other.',
'We hand fossil fuel companies billions in subsidies. Clean energy gets a fraction. Look at the gap.');
a('Climate Crisis','Personal Story',
'MY KID ASKED WHY THE SKY IS ORANGE',
'Hold an orange transparency sheet over the camera lens. The whole world turns wildfire orange.',
"My kid looked out the window last summer and asked why the sky was orange. I didn't have a good answer.");
a('Climate Crisis','Engagement Farming',
'HAS CLIMATE CHANGE HIT YOU YET?',
'Ice cube in an open palm, close-up. Melting. Water dripping between fingers in real time.',
"I want to hear from you. Has climate change hit your life? Wildfires, flooding, heat waves — what's your story?");

a('Attack Trump','List & Rankings',
'3 IMPEACHABLE THINGS. THIS MONTH.',
'Dropping three heavy books on a desk, one at a time. Each slam louder than the last.',
'Three things this president did THIS MONTH that are impeachable. Just this month.');
a('Attack Trump','Myth-Busting',
'THE PRESIDENT CAN\'T DO THAT',
'Holding up a pocket Constitution. Ripping a blank sheet of paper in half right next to it. The Constitution stays intact.',
"People keep saying 'he's the president, he can do what he wants.' No. He literally cannot. Here's why.");
a('Attack Trump','Comparison',
'NIXON GOT KICKED OUT FOR LESS',
'Two photos on a table. Slide one off the edge. It falls. The other one stays. For now.',
'Nixon got forced out for less than what this president does on a Tuesday.');
a('Attack Trump','Personal Story',
'THIS IS WHY I\'M RUNNING',
'Staring at a TV that\'s turned off. Black screen. Then standing up slowly. Walking toward camera.',
"I wasn't planning to run for anything. Then I watched this administration gut the things my community depends on.");
a('Attack Trump','Engagement Farming',
'NAME ONE GOOD THING HE DID',
'Empty chair in frame. Camera pointed at it. Just waiting. Nobody sits down.',
"Seriously. One thing. I'll wait.");

a('Infrastructure Investment','List & Rankings',
'5 BRIDGES NEAR YOU COULD COLLAPSE',
'Snapping popsicle sticks one by one. Five snaps. Each one closer to camera than the last.',
"Five bridges near you have been flagged as structurally deficient. You probably drive over one of them.");
a('Infrastructure Investment','Myth-Busting',
'INFRASTRUCTURE IS YOUR WATER',
'Pouring a glass of tap water. Hold it to the light. Stare at it. Don\'t drink it.',
"People glaze over when you say infrastructure. But it's your water, your roads, your kids' schools. It's everything.");
a('Infrastructure Investment','Comparison',
'CHINA: 27,000 MILES OF RAIL. US: ZERO.',
'Toy bullet train zips across a desk. Then a toy car, wheels stuck, going nowhere. Flick it. Nothing.',
'China has twenty-seven thousand miles of high-speed rail. Want to know how many miles we have? Zero.');
a('Infrastructure Investment','Personal Story',
'$800 POTHOLE',
'Holding up a bent, ruined wheel rim. Just holding it. Staring at it. Setting it on the table hard.',
"I hit a pothole two years ago. Blew out my tire, cracked my rim. Eight hundred bucks. I was living paycheck to paycheck.");
a('Infrastructure Investment','Engagement Farming',
'SHOW ME YOUR WORST ROAD',
'Dropping a marble on a flat surface. It rolls straight. Drop it on a cracked, uneven one. It veers off wildly.',
"Film the worst road, bridge, or sidewalk near you and stitch this. Let's build a map of neglect.");

a('Energy Affordability','List & Rankings',
'3 STATES WHERE BILLS WENT DOWN',
'Flipping a light switch on. Off. On. Off. On. Leave it off. Darkness.',
"Three states actually lowered energy bills for families. Here's the playbook.");
a('Energy Affordability','Myth-Busting',
'CLEAN ENERGY IS CHEAPER',
'Two lightbulbs: old incandescent and an LED. Hold the incandescent close — it burns your fingers. The LED? Ice cold.',
"The biggest lie in energy policy is that clean energy costs more. It doesn't. The data proves it.");
a('Energy Affordability','Comparison',
'YOUR BILL VS COMMUNITY SOLAR',
'Two stacks of cash. One is tall. Knock it over with a finger. Coins scatter everywhere.',
"Right now you're paying a monopoly for power. With community solar, that bill drops 20 percent. Same electricity.");
a('Energy Affordability','Personal Story',
'HEAT OR FOOD. PICK ONE.',
'Wrapping a blanket tight around shoulders. Breath visible. Shivering. A thermostat reads 52°F.',
"My grandmother used to turn the heat off in January to save money. Nobody should have to make that choice.");
a('Energy Affordability','Engagement Farming',
'WHAT\'S YOUR POWER BILL?',
'Holding up a real utility bill to camera. Circling the total with a red marker. Slowly.',
"Drop your monthly power bill in the comments. Let's see who's getting ripped off the most.");

return e;
}

let subjects=[...DS], formats=[...DF], entries={}, currentKey=null, saveTimeout=null;
const SK='content-planner-v3';

function gc(f){return FC[f]||'#6B6560'}
function mk(s,f){return s+'|||'+f}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function es(k){
const e=entries[k];
if(!e)return'empty';
const n=[e.textHook,e.visualHook,e.spokenHook,e.script].filter(v=>v&&v.trim()).length;
return n===0?'empty':n===4?'filled':'partial';
}

function getPreview(k){
const e=entries[k];
if(!e)return'';
return e.textHook||e.spokenHook||e.visualHook||'';
}

// Storage
function debounceSave(){clearTimeout(saveTimeout);saveTimeout=setTimeout(()=>saveToStorage(),300)}
async function saveToStorage(){
try{
await window.storage.set(SK,JSON.stringify({subjects,formats,entries}));
const t=document.getElementById('saveToast');t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),1500);
}catch(e){console.warn('Save failed:',e)}
}
async function loadFromStorage(){
try{
const r=await window.storage.get(SK);
if(r&&r.value){const d=JSON.parse(r.value);if(d.subjects&&d.subjects.length)subjects=d.subjects;if(d.formats&&d.formats.length)formats=d.formats;if(d.entries)entries=d.entries;return true;}
}catch(e){console.log('No saved data.')}
return false;
}
async function clearStorage(){try{await window.storage.delete(SK)}catch(e){}}

// Render
function renderMatrix(){
const head=document.getElementById('matrixHead'),body=document.getElementById('matrixBody');
let h='<tr><th style="border-top:none;border-left:none;background:transparent"></th>';
subjects.forEach((s,i)=>{
h+=`<th><div class="axis-col-header"><span class="axis-label" ondblclick="editSubject(${i},this)">${esc(s)}</span><button class="del-btn" onclick="deleteSubject(${i})" title="Delete column">&times;</button></div></th>`;
});
head.innerHTML=h+'</tr>';

let b='';
formats.forEach((f,fi)=>{
b+=`<tr><td><div class="axis-row-header"><button class="del-btn" onclick="deleteFormat(${fi})" title="Delete row">&times;</button><span class="axis-label" ondblclick="editFormat(${fi},this)">${esc(f)}</span></div></td>`;
subjects.forEach(s=>{
const k=mk(s,f),st=es(k),ic=st==='filled'?'✓':st==='partial'?'…':'+';
const prev=getPreview(k);
b+=`<td><div class="matrix-cell ${st}" onclick="openModal(this)" data-s="${esc(s)}" data-f="${esc(f)}"><div class="cell-dot">${ic}</div>${prev?`<div class="cell-preview">${esc(prev)}</div>`:''}</div></td>`;
});
b+='</tr>';
});
body.innerHTML=b;
updateStats();
}

function renderCards(){
const grid=document.getElementById('cardsGrid');
const fk=Object.keys(entries).filter(k=>es(k)!=='empty');
if(!fk.length){grid.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg><p>No content planned yet. Click a cell above to start.</p></div>';return;}
grid.innerHTML=fk.map(k=>{
const[sub,fmt]=k.split('|||'),e=entries[k],c=gc(fmt);
const hooks=[{l:'Text Hook',v:e.textHook},{l:'Visual Hook',v:e.visualHook},{l:'Spoken Hook',v:e.spokenHook}].filter(h=>h.v&&h.v.trim());
const hs=e.script&&e.script.trim();
const mi=[{l:'Text',h:!!(e.textHook&&e.textHook.trim())},{l:'Visual',h:!!(e.visualHook&&e.visualHook.trim())},{l:'Spoken',h:!!(e.spokenHook&&e.spokenHook.trim())},{l:'Script',h:!!hs}];
return`<div class="content-card">
<div class="card-top"><h3>${esc(sub)}</h3><span class="tag" style="background:${c}18;color:${c}">${esc(fmt)}</span></div>
<div class="card-meta">${mi.map(m=>`<span class="card-meta-item${m.h?' has':''}">${m.h?'●':'○'} ${m.l}</span>`).join('')}</div>
<div class="card-divider"></div>
<div class="card-body">
${hooks.map(h=>`<div class="card-field"><div class="card-field-label">${h.l}</div><div class="card-field-value">${esc(h.v)}</div></div>`).join('')}
${hs?`<div class="card-field"><div class="card-field-label">Script</div><div class="card-field-value">${esc(e.script)}</div></div>`:''}
</div>
<button class="card-edit" onclick="openModalDirect('${sub.replace(/'/g,"\\'")}','${fmt.replace(/'/g,"\\'")}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>Edit</button>
</div>`;
}).join('');
}

function updateStats(){
const t=subjects.length*formats.length,f=Object.keys(entries).filter(k=>es(k)!=='empty').length;
document.getElementById('filledCount').textContent=f;
document.getElementById('totalCount').textContent=t;
}

// Modal
function openModal(el){openModalDirect(el.getAttribute('data-s'),el.getAttribute('data-f'))}
function openModalDirect(sub,fmt){
currentKey=mk(sub,fmt);const e=entries[currentKey]||{},c=gc(fmt);
document.getElementById('modalTitle').textContent=sub;
document.getElementById('modalTags').innerHTML=`<span class="tag" style="background:${c}18;color:${c}">${esc(fmt)}</span>`;
document.getElementById('fTH').value=e.textHook||'';
document.getElementById('fVH').value=e.visualHook||'';
document.getElementById('fSH').value=e.spokenHook||'';
document.getElementById('fSC').value=e.script||'';
document.getElementById('modalOverlay').classList.add('active');
document.getElementById('fTH').focus();
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');currentKey=null}
function saveEntry(){
if(!currentKey)return;
const t=document.getElementById('fTH').value,v=document.getElementById('fVH').value,s=document.getElementById('fSH').value,sc=document.getElementById('fSC').value;
if([t,v,s,sc].every(x=>!x.trim()))delete entries[currentKey];
else entries[currentKey]={textHook:t,visualHook:v,spokenHook:s,script:sc};
closeModal();renderMatrix();renderCards();debounceSave();
}
function clearEntry(){if(!currentKey)return;delete entries[currentKey];closeModal();renderMatrix();renderCards();debounceSave()}

// Add / Edit / Delete
function addSubject(){const n=prompt('New subject:');if(n&&n.trim()){subjects.push(n.trim());renderMatrix();renderCards();debounceSave()}}
function addFormat(){const n=prompt('New format:');if(n&&n.trim()){formats.push(n.trim());renderMatrix();renderCards();debounceSave()}}

function deleteSubject(i){
if(subjects.length<=1){alert('Need at least one subject.');return}
if(!confirm(`Delete "${subjects[i]}" column and all its entries?`))return;
const old=subjects[i];
Object.keys(entries).forEach(k=>{const[s]=k.split('|||');if(s===old)delete entries[k]});
subjects.splice(i,1);renderMatrix();renderCards();debounceSave();
}
function deleteFormat(i){
if(formats.length<=1){alert('Need at least one format.');return}
if(!confirm(`Delete "${formats[i]}" row and all its entries?`))return;
const old=formats[i];
Object.keys(entries).forEach(k=>{const[,f]=k.split('|||');if(f===old)delete entries[k]});
formats.splice(i,1);renderMatrix();renderCards();debounceSave();
}

function editSubject(i,el){
const cur=subjects[i],inp=document.createElement('input');
inp.className='axis-input';inp.value=cur;el.replaceWith(inp);inp.focus();inp.select();
function commit(){const nv=inp.value.trim()||cur;Object.keys(entries).forEach(k=>{const[s,f]=k.split('|||');if(s===cur){entries[mk(nv,f)]=entries[k];delete entries[k]}});subjects[i]=nv;renderMatrix();renderCards();debounceSave()}
inp.addEventListener('blur',commit);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur()}});
}
function editFormat(i,el){
const cur=formats[i],inp=document.createElement('input');
inp.className='axis-input';inp.value=cur;el.replaceWith(inp);inp.focus();inp.select();
function commit(){const nv=inp.value.trim()||cur;Object.keys(entries).forEach(k=>{const[s,f]=k.split('|||');if(f===cur){entries[mk(s,nv)]=entries[k];delete entries[k]}});formats[i]=nv;renderMatrix();renderCards();debounceSave()}
inp.addEventListener('blur',commit);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=cur;inp.blur()}});
}

function resetAll(){
if(!confirm('Clear everything and reset to defaults?'))return;
subjects=[...DS];formats=[...DF];entries=seedEntries();
renderMatrix();renderCards();debounceSave();
}

// PDF
async function downloadPDF(){
const el=document.getElementById('pdf-capture'),btn=document.getElementById('pdfBtn');
btn.textContent='Generating…';btn.disabled=true;
try{
const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#F6F4F0',windowWidth:el.scrollWidth,windowHeight:el.scrollHeight});
const{jsPDF}=window.jspdf;
const pdf=new jsPDF({orientation:canvas.width>canvas.height?'landscape':'portrait',unit:'px',format:[canvas.width/2,canvas.height/2]});
pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,canvas.width/2,canvas.height/2);
pdf.save('content-planner.pdf');
}catch(err){console.error(err);alert('PDF export failed.')}
btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export PDF';
btn.disabled=false;
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modalOverlay').classList.contains('active'))closeModal()});

// Init
async function init(){
const loaded=await loadFromStorage();
if(!loaded){entries=seedEntries();}
renderMatrix();renderCards();
const l=document.getElementById('loadingScreen');l.classList.add('fade-out');setTimeout(()=>l.remove(),400);
}
init();
</script>
</body>
</html>
